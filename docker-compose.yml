version: '3'

services:
  backend:
    build: ./backend
    restart: always
    environment:
      - FOTOS_PATH=/fotos
      - TZ=America/Sao_Paulo
      # Defina as origens permitidas pelo CORS (frontend URL)
      - ALLOWED_ORIGINS=http://localhost:8090
    volumes:
      - ./fotos:/fotos
    # Porta 8000 NÃO exposta externamente — acesso via rede interna Docker
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "8090:80"
    volumes:
      - ./fotos:/fotos:ro
    depends_on:
      - backend
