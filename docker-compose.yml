services:
  backend:
    build:
      context: ./backend
    restart: always
    environment:
      FOTOS_PATH: /fotos
    volumes:
      - ./fotos:/fotos
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    restart: always
    volumes:
      - frontend_build:/app/build

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./fotos:/fotos:ro
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend

volumes:
  frontend_build:
