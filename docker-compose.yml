version: '3'

services:
  backend:
    build: ./backend
    restart: always
    environment:
      - FOTOS_PATH=/fotos
    volumes:
      - ./fotos:/fotos
    ports:
      - "8000:8000"
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "8090:80"
    volumes:
      - ./fotos:/fotos:ro
    depends_on:
      - backend
